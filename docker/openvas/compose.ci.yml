# CI override: skip pulling openvas-scanner:stable for services that already
# have the image loaded from the cached tar. The cached image is arm64 (saved
# from macOS); QEMU emulation in the CI workflow allows it to run on amd64.
services:
  configure-openvas:
    pull_policy: if_not_present
    platform: linux/arm64
  openvas:
    pull_policy: if_not_present
    platform: linux/arm64
  openvasd:
    pull_policy: if_not_present
    platform: linux/arm64
