name: CI

on:
  push:
    branches: ["develop", "main"]
  pull_request:
    branches: ["develop", "main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"
      - name: Run pytest with coverage
        run: pytest --cov=openvas_mcp --cov-report=term-missing --cov-report=xml --cov-fail-under=80
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  coverage:
    name: Coverage badge
    runs-on: ubuntu-latest
    needs: test
    # Only commit the badge on push — PRs don't write back to the branch
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Generate coverage badge
        run: pip install genbadge[coverage] && genbadge coverage -i coverage.xml -o docs/coverage-badge.svg
      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage-badge.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge [skip ci]" && git push
