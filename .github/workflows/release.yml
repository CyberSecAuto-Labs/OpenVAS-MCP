name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE: ghcr.io/cybersecauto-labs/openvas-mcp

jobs:
  release:
    name: Release ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create GitHub Release
      packages: write   # push to GHCR
      id-token: write   # cosign keyless OIDC signing

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for changelog

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push versioned image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless OIDC)
        run: cosign sign --yes "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log --pretty=format:"- %s (%h)" "${PREV_TAG}..HEAD")
          else
            LOG=$(git log --pretty=format:"- %s (%h)")
          fi
          {
            echo "log<<EOF"
            echo "$LOG"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Generate SBOM
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft "${{ env.IMAGE }}@${{ steps.build.outputs.digest }}" \
            -o cyclonedx-json > sbom.cyclonedx.json

      - name: Scan SBOM for vulnerabilities (grype)
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin
          grype sbom:sbom.cyclonedx.json --fail-on high

      - name: Package release artifacts
        run: |
          mkdir -p release-artifacts
          cp compose.yaml release-artifacts/compose.yaml
          cp compose.override.yaml release-artifacts/compose.override.yaml

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## What's changed

            ${{ steps.changelog.outputs.log }}

            ## Docker image

            ```
            docker pull ${{ env.IMAGE }}:${{ github.ref_name }}
            ```

            Verify image signature:
            ```
            cosign verify \
              --certificate-identity-regexp "https://github.com/CyberSecAuto-Labs/OpenVAS-MCP/.github/workflows/release.yml@refs/tags/.*" \
              --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
              ${{ env.IMAGE }}:${{ github.ref_name }}
            ```
          files: |
            release-artifacts/compose.yaml
            release-artifacts/compose.override.yaml
            sbom.cyclonedx.json
