name: Coverage badge

# Fires whenever either unit or integration tests complete on main.
# The gate job checks whether the other workflow has also completed for the
# same commit before proceeding — no badge is generated until both are done.
on:
  workflow_run:
    workflows: ["Lint & Test", "Integration tests"]
    branches: ["main"]
    types: [completed]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  gate:
    name: Check both workflows complete
    runs-on: ubuntu-latest
    # Only care about push events, not PRs
    if: github.event.workflow_run.event == 'push'
    outputs:
      ready: ${{ steps.check.outputs.ready }}
      unit_run_id: ${{ steps.check.outputs.unit_run_id }}
      integration_run_id: ${{ steps.check.outputs.integration_run_id }}
    steps:
      - name: Locate both run IDs for this commit
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          sha="${{ github.event.workflow_run.head_sha }}"
          branch="${{ github.event.workflow_run.head_branch }}"
          triggering="${{ github.event.workflow_run.name }}"

          repo="${{ github.repository }}"

          if [ "$triggering" = "Integration tests" ]; then
            integration_run_id="${{ github.event.workflow_run.id }}"
            unit_run_id=$(gh run list --repo="$repo" --workflow=ci.yml --branch="$branch" \
              --json databaseId,headSha,status --limit 20 \
              | jq -r --arg sha "$sha" \
              '.[] | select(.headSha == $sha and .status == "completed") | .databaseId' \
              | head -1)
          else
            unit_run_id="${{ github.event.workflow_run.id }}"
            integration_run_id=$(gh run list --repo="$repo" --workflow=integration.yml --branch="$branch" \
              --json databaseId,headSha,status --limit 20 \
              | jq -r --arg sha "$sha" \
              '.[] | select(.headSha == $sha and .status == "completed") | .databaseId' \
              | head -1)
          fi

          if [ -z "$unit_run_id" ] || [ -z "$integration_run_id" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "The other workflow has not completed yet for $sha — skipping."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
            echo "unit_run_id=$unit_run_id" >> "$GITHUB_OUTPUT"
            echo "integration_run_id=$integration_run_id" >> "$GITHUB_OUTPUT"
          fi

  badge:
    name: Combine coverage and update badge
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.ready == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event.workflow_run.head_branch }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Download unit coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ needs.gate.outputs.unit_run_id }} \
            --repo=${{ github.repository }} \
            --name coverage-unit \
            --dir coverage-unit

      - name: Download integration coverage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh run download ${{ needs.gate.outputs.integration_run_id }} \
            --repo=${{ github.repository }} \
            --name coverage-integration \
            --dir coverage-integration

      - name: Combine coverage and generate badge
        run: |
          mv coverage-unit/.coverage .coverage.unit
          mv coverage-integration/.coverage .coverage.integration
          coverage combine .coverage.unit .coverage.integration
          coverage xml
          genbadge coverage -i coverage.xml -o docs/coverage-badge.svg

      - name: Commit badge if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/coverage-badge.svg
          git diff --staged --quiet || git commit -m "chore: update coverage badge" && git push
