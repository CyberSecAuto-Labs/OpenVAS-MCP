name: Integration tests

# Run on PRs and pushes targeting main only — not on every dev branch push,
# to avoid burning minutes on iteration. The full Greenbone stack is heavy.
on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  integration:
    name: Integration tests (live GVM)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package and dev dependencies
        run: pip install -e ".[dev]"

      - name: Pull Docker Hub images
        run: |
          for attempt in 1 2 3; do
            docker pull alpine/socat && break
            echo "Attempt $attempt failed, retrying in 10s..."
            sleep 10
          done

      - name: Configure Docker for sequential layer downloads and debug logging
        run: |
          echo '{"max-concurrent-downloads": 1, "debug": true}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 3

      - name: Pre-pull openvas-scanner (most problematic image)
        timeout-minutes: 20
        run: |
          IMAGE=registry.community.greenbone.net/community/openvas-scanner:stable
          for attempt in $(seq 1 8); do
            docker pull --platform linux/amd64 "$IMAGE" && break
            echo "Attempt $attempt/8 failed, retrying in 60s..."
            [ "$attempt" -lt 8 ] && sleep 60 || { echo "All pre-pull attempts failed."; exit 1; }
          done

      - name: Debug — Docker daemon logs after openvas-scanner pull
        if: always()
        run: |
          echo "=== Docker daemon logs (last 60 lines) ==="
          sudo journalctl -u docker -n 60 --no-pager
          echo "=== Registry manifest (stable) ==="
          TOKEN=$(curl -sf "https://registry.community.greenbone.net/token?service=registry.community.greenbone.net&scope=repository:community/openvas-scanner:pull" | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])" 2>/dev/null || echo "")
          if [ -n "$TOKEN" ]; then
            curl -sf -H "Authorization: Bearer $TOKEN" \
              -H "Accept: application/vnd.docker.distribution.manifest.v2+json,application/vnd.oci.image.manifest.v1+json" \
              "https://registry.community.greenbone.net/v2/community/openvas-scanner/manifests/stable" \
              | python3 -m json.tool 2>/dev/null || echo "manifest fetch failed"
          else
            echo "token fetch failed (unauthenticated registry)"
          fi

      - name: Pull Greenbone Community Edition images
        timeout-minutes: 20
        run: |
          for attempt in 1 2 3; do
            docker compose -f docker/openvas/compose.yaml pull && break
            [ "$attempt" -lt 3 ] && echo "Pull attempt $attempt failed, retrying in 30s..." && sleep 30 || { echo "All pull attempts failed."; exit 1; }
          done

      - name: Start Greenbone Community Edition stack
        run: docker compose -f docker/openvas/compose.yaml up -d --pull never

      - name: Wait for gvmd socket proxy
        # The socat proxy only accepts connections once gvmd's Unix socket exists.
        run: |
          echo "Waiting for gvmd TCP proxy (up to 10 min)..."
          timeout 600 bash -c '
            until python -c "
          import sys, socket
          try:
              s = socket.create_connection((\"127.0.0.1\", 9393), timeout=5)
              s.close(); sys.exit(0)
          except Exception:
              sys.exit(1)
          " 2>/dev/null; do printf "."; sleep 10; done'
          echo ""
          echo "gvmd socket proxy ready."

      - name: Set admin password
        # gvmd creates admin with a random password on first run; set a known one.
        run: |
          docker compose -f docker/openvas/compose.yaml exec -T -u gvmd gvmd \
            gvmd --user=admin --new-password=cipassword123

      - name: Verify GMP authentication
        run: |
          timeout 60 bash -c '
            until GVM_HOST=127.0.0.1 GVM_PORT=9393 GVM_PASSWORD=cipassword123 python -c "
          from openvas_mcp.gvm_client import gmp_session
          with gmp_session(): pass
          " 2>/dev/null; do printf "."; sleep 5; done'
          echo "GMP authentication OK."

      - name: Run integration tests
        env:
          GVM_INTEGRATION: "1"
          GVM_HOST: "127.0.0.1"
          GVM_PORT: "9393"
          GVM_PASSWORD: "cipassword123"
        run: pytest tests/integration/ -v

      - name: Stop stack
        if: always()
        run: docker compose -f docker/openvas/compose.yaml down -v
